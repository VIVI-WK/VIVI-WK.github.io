<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>NORMANN 庫存明細</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+TC:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F3EDE4;--card:#FBF8F2;--line:#E5D9C8;--line2:#EFE7DA;--ink:#3A3027;--soft:#8C7B66;
 --green:#3C4A3E;--green2:#4E5F50;--clay:#C08457;--claysoft:#F0DCC8;--has:#5C7A52;--none:#B5562F;--pre:#A9772E}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:"Microsoft JhengHei","微軟正黑體","Segoe UI",sans-serif;font-size:13.5px;-webkit-font-smoothing:antialiased}
/* gate */
#gate{position:fixed;inset:0;z-index:80;background:var(--green);display:flex;align-items:center;justify-content:center;padding:20px}
#gate .box{background:var(--card);border-radius:18px;padding:34px 30px;max-width:360px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.25);text-align:center}
#gate .wm{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:26px;letter-spacing:2px;color:var(--green)}
#gate .zh{font-family:"Noto Serif TC",serif;font-size:14px;letter-spacing:3px;color:var(--soft);margin-top:2px}
#gate p{color:var(--soft);font-size:12.5px;margin:16px 0 14px}
#gate input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:16px;font-family:inherit;text-align:center;letter-spacing:2px;background:#fff;color:var(--ink)}
#gate input:focus{outline:none;border-color:var(--clay);box-shadow:0 0 0 3px var(--claysoft)}
#gate button{margin-top:14px;width:100%;padding:12px;border:none;border-radius:12px;background:var(--clay);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
#gate .err{color:var(--none);font-size:12.5px;margin-top:10px;min-height:16px}
#app{display:none}
header{background:var(--green);color:#F1EADC;padding:22px 24px 18px;border-bottom:3px solid var(--clay)}
.brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand .wm{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:30px;letter-spacing:3px;color:#F4ECDD;line-height:1}
.brand .zh{font-family:"Noto Serif TC",serif;font-size:15px;letter-spacing:4px;color:#C9B79C}
.subline{margin-top:8px;font-size:12px;letter-spacing:.5px;color:#B7C2B3}.subline b{color:#E7C9A8}
.wrap{max-width:1300px;margin:0 auto;padding:16px 16px 60px}
.controls{background:var(--paper);padding:12px 0 14px}
.searchrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#q{flex:1;min-width:210px;padding:11px 14px;border:1px solid var(--line);border-radius:12px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink)}
#q:focus{outline:none;border-color:var(--clay);box-shadow:0 0 0 3px var(--claysoft)}
.btn{padding:9px 13px;border:1px solid var(--line);background:var(--card);border-radius:22px;cursor:pointer;font-size:12.5px;font-family:inherit;color:var(--soft)}
.btn.on{background:var(--clay);color:#fff;border-color:var(--clay)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.chip{padding:6px 13px;border:1px solid var(--line);background:var(--card);border-radius:20px;cursor:pointer;font-size:12.5px;color:var(--soft);font-family:"Noto Serif TC",serif;letter-spacing:1px}
.chip.on{background:var(--green);color:#F1EADC;border-color:var(--green)}
.statusline{font-size:12px;color:var(--soft);margin:11px 3px 0}
.note{font-size:11px;color:#A6957E;margin:5px 3px 0;line-height:1.5}
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(95,70,40,.07)}
thead th{position:sticky;top:0;z-index:15;background:#E7DAC6;color:#6B5A44;font-family:"Noto Serif TC",serif;font-size:12px;font-weight:600;letter-spacing:1px;text-align:left;padding:11px 8px;border-bottom:1px solid var(--clay);box-shadow:0 2px 6px rgba(95,70,40,.12)}
th.preh{color:#8A5A1E}
td{padding:8px 8px;border-bottom:1px solid var(--line2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:#F6EFE3}
.thumb{width:48px;height:48px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:8px;cursor:zoom-in;display:block}
.model{font-weight:700;font-variant-numeric:tabular-nums}
.cat{font-family:"Noto Serif TC",serif;color:var(--green2);font-size:12.5px;white-space:nowrap}
.name{font-size:12.8px;line-height:1.3;max-width:300px}.name b{font-weight:700}
.name .tag{display:inline-block;background:var(--claysoft);color:#9A5A2A;font-size:10.5px;padding:1px 6px;border-radius:5px;margin-right:5px;vertical-align:1px}
.name .detail{display:block;color:var(--soft);font-size:10.5px;margin-top:2px;white-space:pre-line}
.num{text-align:center;font-variant-numeric:tabular-nums;white-space:nowrap}
.stock{font-weight:800;font-size:16px}.stock.has{color:var(--has)}.stock.none{color:var(--none)}
.pre{font-weight:800;font-size:15px;color:var(--pre)}.precell{background:#FBF1DF}
.rsv{font-weight:700;color:#9A5A2A}.ext{font-weight:700;color:#7a6a52}
.price{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:700;color:#5A4A37}
.price .cur,.eur .cur{font-size:10.5px;color:var(--soft);font-weight:500;margin-right:1px}
.eur{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:#6F5E48}
.muted{color:#CABBA6}
footer{max-width:1300px;margin:0 auto;padding:0 18px 34px;color:#A6957E;font-size:11px;letter-spacing:1px}
footer .mk{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:15px;color:var(--clay)}
#lb{display:none;position:fixed;inset:0;background:rgba(40,30,20,.82);z-index:50;align-items:center;justify-content:center;cursor:zoom-out}
#lb img{max-width:86vw;max-height:86vh;background:#fff;border-radius:12px;padding:6px}
@media(max-width:860px){
 thead{display:none}
 table,tbody{display:block}
 table{border:none;background:transparent;box-shadow:none;border-radius:0}
 tr{display:block;background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(95,70,40,.07)}
 td{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:8px 0;border:none;border-bottom:1px dashed var(--line2);font-size:14.5px}
 td:last-child{border-bottom:none}
 td::before{content:attr(data-l);color:var(--soft);font-size:13px;font-weight:600;flex:0 0 auto}
 td.imgcell{justify-content:center;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:4px}
 td.imgcell::before{content:""}
 .thumb{width:150px;height:150px}
 td.namecell{display:block;border-bottom:1px solid var(--line)}
 td.namecell::before{content:"品名";display:block;color:var(--soft);font-size:13px;font-weight:600;margin-bottom:4px}
 .name{max-width:none;text-align:left;font-size:15px;line-height:1.45}
 .name .detail{font-size:12.5px;margin-top:4px}
 .num,.price,.eur{text-align:right}
 .stock{font-size:18px}.pre{font-size:17px}
 .precell{background:transparent}
 .cat{font-size:14px}.model{font-size:15px}
 #gate .box{padding:30px 24px}
}
</style></head>

<div id="gate"><div class="box">
 <div class="wm">NORMANN COPENHAGEN</div><div class="zh">庫存明細</div>
 <p>請輸入密碼以檢視內容</p>
 <input id="pw" type="password" inputmode="numeric" placeholder="密碼" autocomplete="off">
 <button id="enter">進入</button>
 <div class="err" id="err"></div>
</div></div>
<div id="app">
<header>
 <div class="brand"><span class="wm">NORMANN COPENHAGEN</span><span class="zh">庫存明細</span></div>
 <div class="subline">門市 · 客服查貨　／　共 <b id="total"></b> 項　／　更新 2026/06/15</div>

<div class="wrap">
 <div class="controls">
  <div class="searchrow">
   <input id="q" placeholder="搜尋型號、品名、分類…">

 </div>
 <table>
  <thead><tr>
   <th>圖</th><th>分類</th><th>型號</th><th>品名</th>
   <th class="num">仁愛</th><th class="num">內湖</th><th class="num">新店庫存</th>
   <th class="num preh">第三批預購</th><th class="num">保留</th><th class="num">外借</th>

  <tbody id="tb"></tbody>
 </table>
</div>
<footer>內部庫存參考文件　·　<span class="mk">curated by VIVI</span></footer>
</div>

async function decrypt(pw){
 const raw=Uint8Array.from(atob(ENC),c=>c.charCodeAt(0));
 const salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
 const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
 const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
 return JSON.parse(new TextDecoder().decode(pt));
}
async function tryEnter(){
 const pw=document.getElementById('pw').value;const err=document.getElementById('err');
 err.textContent='解密中…';
 try{DATA=await decrypt(pw);start();document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';}
 catch(e){err.textContent='密碼錯誤,請再試一次';}
}
document.getElementById('enter').addEventListener('click',tryEnter);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryEnter();});
document.getElementById('pw').focus();
function nameHtml(n){n=(n||"").trim();let tag="";const m=n.match(/^【([^】]*)】/);if(m){tag=`<span class="tag">${m[1]}</span>`;n=n.replace(/^【[^】]*】\s*/,'');}
 const l=n.split(/\n/).map(s=>s.trim()).filter(Boolean);const t=l.shift()||"";return tag+`<b>${t}</b>`+(l.length?`<span class="detail">${l.join('\n')}</span>`:"");}
function row(it){
 const sc=it.stock>0?'has':'none';
 const img=it.img?`<img class="thumb" src="${it.img}" loading="lazy" onclick="zoom('${it.img}')">`:'<span class="muted">無圖</span>';
 const eur=it.eur!==""&&it.eur!=null?`<span class="cur">€</span>${Number(it.eur).toLocaleString()}`:'<span class="muted">—</span>';
 const ntd=it.price!==""&&it.price!=null?`<span class="cur">NT$</span>${Number(it.price).toLocaleString()}`:'<span class="muted">—</span>';
 return `<tr>
  <td class="imgcell" data-l="圖">${img}</td>
  <td data-l="分類"><span class="cat">${it.cat||''}</span></td>
  <td data-l="型號"><span class="model">${it.model||''}</span></td>

  <td class="num" data-l="仁愛">${it.ra||'<span class="muted">—</span>'}</td>
  <td class="num" data-l="內湖">${it.nh||'<span class="muted">—</span>'}</td>
  <td class="num" data-l="新店庫存"><span class="stock ${sc}">${it.stock}</span></td>
  <td class="num precell" data-l="第三批預購">${it.g?'<span class="pre">'+it.g+'</span>':'<span class="muted">—</span>'}</td>
  <td class="num" data-l="保留">${it.rsv?'<span class="rsv">'+it.rsv+'</span>':'<span class="muted">—</span>'}</td>
  <td class="num" data-l="外借">${it.wl?'<span class="ext">'+it.wl+'</span>':'<span class="muted">—</span>'}</td>
  <td class="eur" data-l="定價€">${eur}</td>
  <td class="price" data-l="定價NT$">${ntd}</td>
 </tr>`;}
function render(){
 const list=DATA.filter(it=>{
  if(activeCat&&it.cat!==activeCat)return false;
  if(fStock&&!(it.stock>0))return false;
  if(fPre&&!(it.g>0))return false;
  if(q){const s=(it.model+' '+it.name+' '+it.cat).toLowerCase();if(!s.includes(q))return false;}
  return true;});
 document.getElementById('tb').innerHTML=list.map(row).join('');
 document.getElementById('count').textContent='顯示 '+list.length+' 項'+(activeCat?'　·　'+activeCat:'');}
function start(){
 const cats=[];DATA.forEach(it=>{if(it.cat&&!cats.includes(it.cat))cats.push(it.cat)});
 const chips=document.getElementById('chips');
 chips.innerHTML='<span class="chip on" data-c="">全部</span>'+cats.map(c=>`<span class="chip" data-c="${c}">${c}</span>`).join('');
 document.getElementById('total').textContent=DATA.length;
 document.getElementById('q').addEventListener('input',e=>{q=e.target.value.trim().toLowerCase();render()});
 chips.addEventListener('click',e=>{const c=e.target.dataset.c;if(c===undefined)return;activeCat=c;[...chips.children].forEach(x=>x.classList.toggle('on',x.dataset.c===c));render()});
 document.querySelectorAll('.btn[data-f]').forEach(b=>b.addEventListener('click',function(){const f=this.dataset.f;if(f==='stock')fStock=!fStock;else fPre=!fPre;this.classList.toggle('on');render()}));
 render();
}
function zoom(s){document.getElementById('lbimg').src=s;document.getElementById('lb').style.display='flex'}
document.getElementById('lb').addEventListener('click',()=>document.getElementById('lb').style.display='none');
</script></body></html>
